<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
  <title>Appointment Viewer</title>
  <link href="/src/styles.css/dashboard-appointment.css" rel="stylesheet">
</head>
<body>
  <div class="container">
    <h1>Appointment Viewer</h1>

    <div class="controls">
      <input type="text" id="searchInput" placeholder="Search by name..." />
      <select id="filterSelect">
        <option value="All">All Status</option>
        <option value="Confirmed">Confirmed</option>
        <option value="Pending">Pending</option>
      </select>
      <button onclick="applyFilters()">Search</button>
    </div>

    <div id="appointmentsContainer"></div>
  </div>

  <script>
    const appointments = [
      {
        id: 1,
        name: "John Doe",
        date: "2025-04-12",
        time: "10:00 AM",
        service: "Dental Cleaning",
        address: "123 Main St, Springfield",
        status: "Confirmed",
      },
      {
        id: 2,
        name: "Jane Smith",
        date: "2025-04-13",
        time: "02:00 PM",
        service: "Eye Checkup",
        address: "456 Elm Ave, Shelbyville",
        status: "Pending",
      },
      {
        id: 3,
        name: "Mark Johnson",
        date: "2025-04-14",
        time: "11:30 AM",
        service: "Physical Therapy",
        address: "789 Oak Rd, Capital City",
        status: "Confirmed",
      }
    ];

    let displayedAppointments = [...appointments];

    function renderAppointments() {
      const container = document.getElementById("appointmentsContainer");
      container.innerHTML = "";

      if (displayedAppointments.length === 0) {
        container.innerHTML = "<p>No appointments found.</p>";
        return;
      }

      displayedAppointments.forEach((appt) => {
        const card = document.createElement("div");
        card.className = "card";
        card.innerHTML = `
          <h3>${appt.name}</h3>
          <small><strong>Date:</strong> ${appt.date} | <strong>Time:</strong> ${appt.time}</small>
          <small><strong>Service:</strong> ${appt.service}</small>
          <small><strong>Status:</strong> ${appt.status}</small>
          <small><strong>Address:</strong> ${appt.address}</small>
          <button class="delete-btn" onclick="deleteAppointment(${appt.id})">Delete</button>
        `;
        container.appendChild(card);
      });
    }

    function applyFilters() {
      const searchValue = document.getElementById("searchInput").value.toLowerCase();
      const filterStatus = document.getElementById("filterSelect").value;

      displayedAppointments = appointments.filter(appt => {
        const matchesName = appt.name.toLowerCase().includes(searchValue);
        const matchesStatus = filterStatus === "All" || appt.status === filterStatus;
        return matchesName && matchesStatus;
      });

      renderAppointments();
    }

    function deleteAppointment(id) {
      const index = appointments.findIndex(appt => appt.id === id);
      if (index !== -1) {
        appointments.splice(index, 1);
        applyFilters();
      }
    }

    // Initial render
    renderAppointments();
  </script>
</body>
</html>
