<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Event Manager</title>
    <link rel="stylesheet" href="/src/styles.css/event.css">
</head>
<body>
    <div class="container">
        <div class="add-event">
            <div class="heading-Section">
                <input type="text" id="event-heading" placeholder="Event Heading">
                <input type="date" id="event-date">
                <input type="file" id="event-image" placeholder="upload image thumbnail">
            </div>
            <textarea type="text" id="event-description" placeholder="Event Description" wid></textarea>            
            <button onclick="addEvent()">Add Event</button>
        </div>
        <h2>Event Manager</h2>
        <div id="event-list"></div>
    </div>

    <script>
        let events = [
            { heading: "Tech Conference", description: "A tech event about AI and Cloud.", date: "2025-05-10", image: "https://via.placeholder.com/50" },
            { heading: "Music Festival", description: "Enjoy live music performances.", date: "2025-06-20", image: "https://via.placeholder.com/50" }
        ];

        function displayEvents() {
            const eventList = document.getElementById("event-list");
            eventList.innerHTML = "";

            events.forEach((event, index) => {
                const eventCard = document.createElement("div");
                eventCard.className = "event-card";
                eventCard.innerHTML = `
                    <img src="${event.image || 'https://via.placeholder.com/50'}" alt="Event Image">
                    <div class="event-info">
                        <strong>${event.heading}</strong><br>
                        ${event.description}<br>
                        <small>${event.date}</small>
                    </div>
                    <button class="delete-btn" onclick="deleteEvent(${index})">Delete</button>
                `;
                eventList.appendChild(eventCard);
            });
        }

        function addEvent() {
            const heading = document.getElementById("event-heading").value;
            const description = document.getElementById("event-description").value;
            const date = document.getElementById("event-date").value;
            const image = document.getElementById("event-image").value;

            if (!heading || !description || !date) {
                alert("Please fill in all required fields.");
                return;
            }

            events.push({ heading, description, date, image });
            displayEvents();

            document.getElementById("event-heading").value = "";
            document.getElementById("event-description").value = "";
            document.getElementById("event-date").value = "";
            document.getElementById("event-image").value = "";
        }

        function deleteEvent(index) {
            events.splice(index, 1);
            displayEvents();
        }

        displayEvents();
    </script>
</body>
</html>
