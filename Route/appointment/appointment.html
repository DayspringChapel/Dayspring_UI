<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Appointments Viewer</title>
    <link rel="stylesheet" href="/src/styles.css/dashboard-Apointment.css">
</head>
<body>
    <div class="container">
        <h2>Appointments</h2>
        <div class="filters">
            <select id="filter">
                <option value="daily">Daily</option>
                <option value="monthly">Monthly</option>
            </select>
            <div>
              <input type="date" id="dateFilter">
              <button onclick="filterByDate()">View</button>
            </div>
            <input type="text" id="search" placeholder="Search by name or email" onkeyup="searchAppointments()">
        </div>
        <div id="appointments"></div>
    </div>
    <script>
        const appointments = [
            { date: "2025-03-13", name: "John Doe", email: "john@example.com", contact: "123-456-7890", purpose: "Consultation" },
            { date: "2025-03-13", name: "Jane Smith", email: "jane@example.com", contact: "987-654-3210", purpose: "Business Meeting" },
            { date: "2025-03-14", name: "Alice Johnson", email: "alice@example.com", contact: "555-666-7777", purpose: "Project Discussion" },
            { date: "2025-04-01", name: "Bob Brown", email: "bob@example.com", contact: "111-222-3333", purpose: "Follow-up Appointment" },
        ];
        
        function formatDate(dateStr) {
            return new Date(dateStr).toISOString().split('T')[0];
        }
        
        function displayAppointments(filter) {
            const today = formatDate(new Date());
            const currentMonth = today.substring(0, 7);
            const container = document.getElementById("appointments");
            container.innerHTML = "";
            
            let filteredAppointments = appointments.filter(appt => {
                if (filter === "daily") {
                    return appt.date === today;
                } else {
                    return appt.date.startsWith(currentMonth);
                }
            }).sort((a, b) => new Date(a.date) - new Date(b.date));
            
            renderAppointments(filteredAppointments);
        }
        
        function filterByDate() {
            const selectedDate = document.getElementById("dateFilter").value;
            const container = document.getElementById("appointments");
            container.innerHTML = "";
            
            let filteredAppointments = appointments.filter(appt => appt.date === selectedDate);
            
            renderAppointments(filteredAppointments);
        }
        
        function searchAppointments() {
            const searchQuery = document.getElementById("search").value.toLowerCase();
            const filteredAppointments = appointments.filter(appt => 
                appt.name.toLowerCase().includes(searchQuery) || 
                appt.email.toLowerCase().includes(searchQuery)
            );
            
            renderAppointments(filteredAppointments);
        }
        
        function renderAppointments(appointmentsList) {
            const container = document.getElementById("appointments");
            container.innerHTML = "";
            
            if (appointmentsList.length === 0) {
                container.innerHTML = "<p class='no-appointments'>No appointments found.</p>";
                return;
            }
            
            appointmentsList.forEach(appt => {
                const div = document.createElement("div");
                div.className = "appointment";
                div.innerHTML = `<span><strong>${appt.date}</strong><br>
                                 Name: ${appt.name}<br>
                                 Email: ${appt.email}<br>
                                 Contact: ${appt.contact}<br>
                                 Purpose: ${appt.purpose}</span> 
                                 <button class="confirm-button" onclick="confirmAddressed(this)">Confirm</button>`;
                container.appendChild(div);
            });
        }
        
        function confirmAddressed(button) {
            button.textContent = "Confirmed";
            button.disabled = true;
            button.style.backgroundColor = "gray";
        }
        
        document.getElementById("filter").addEventListener("change", function() {
            displayAppointments(this.value);
        });
        
        displayAppointments("daily");
    </script>
</body>
</html>
