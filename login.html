<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Dayspring Chapel CMS Login</title>
    <link rel="stylesheet" href="/src/styles.css/login.css">
</head>
<body>
    <div class="login-container">
        <h2>Welcome Back</h2>
        <form class="login-form">
            <input id="userNameOrEmail" type="text" placeholder="Username" required>
            <input id="password" type="password" placeholder="Password" required>
            <button type="submit">Login</button>
        </form>
        <p class="footer-text">Don't have an account? <a href="#">Sign up</a></p>
    </div>
    <script type="module" src="/src/auth/login.js"></script>
    <script src="https://cdn.jsdelivr.net/npm/sweetalert2@11"></script>
</body>
</html>
